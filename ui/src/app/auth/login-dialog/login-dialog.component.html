<p-dialog
  header="Sign In"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '380px' }"
  (onHide)="close()"
>
  <form class="login-form" (ngSubmit)="submit()">
    @if (error()) {
      <p-message severity="error" [text]="error()" styleClass="w-full mb-1" />
    }

    <div class="field">
      <label for="loginUsername">Username</label>
      <input
        pInputText
        id="loginUsername"
        [(ngModel)]="username"
        name="username"
        placeholder="Enter username"
        required
        class="w-full"
        autocomplete="username"
      />
    </div>

    <div class="field">
      <label for="loginPassword">Password</label>
      <p-password
        inputId="loginPassword"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter password"
        [toggleMask]="true"
        [feedback]="false"
        styleClass="w-full"
        inputStyleClass="w-full"
        required
      />
    </div>

    <p-button
      type="submit"
      label="Sign In"
      icon="pi pi-sign-in"
      iconPos="right"
      styleClass="w-full mt-2"
      [loading]="loading()"
      [disabled]="!username || !password"
    />
  </form>
</p-dialog>
