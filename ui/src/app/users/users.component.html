<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="users">
  <vr-app-header
    title="Violin Retirement"
    logoIcon="pi pi-chart-line"
    [username]="auth.currentUser()?.full_name ?? null"
    [leftAction]="headerLeftAction"
    [actions]="headerActions"
    (actionClick)="onHeaderAction($event)"
  />
  <div class="users__body">
    <div class="header-bar">
      <h1 class="header-bar__title">User Management</h1>
      <p-button
        label="Create New User"
        icon="pi pi-plus"
        size="small"
        (onClick)="openCreateDialog()"
      />
    </div>

    @if (loading()) {
      <div class="loading-state">
        <i class="pi pi-spin pi-spinner loading-state__icon"></i>
        <p>Loading users…</p>
      </div>
    } @else {
      <p-card styleClass="users__card">
        <p-table
      [value]="users()"
      [tableStyle]="{ 'min-width': '50rem' }"
      responsiveLayout="scroll"
      [globalFilterFields]="['username', 'full_name', 'role']"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Username</th>
          <th>Full Name</th>
          <th>Role</th>
          <th>Status</th>
          <th>Created</th>
          <th>Last Login</th>
          <th>Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ user.full_name }}</td>
          <td>
            <p-tag
              [value]="getRoleTag(user.role).label"
              [severity]="getRoleTag(user.role).severity"
            ></p-tag>
          </td>
          <td>
            <p-tag
              [value]="getStatusTag(user.active).label"
              [severity]="getStatusTag(user.active).severity"
            ></p-tag>
          </td>
          <td>{{ formatDate(user.created_at) }}</td>
          <td>{{ formatDate(user.last_login) }}</td>
          <td>
            <div class="row-actions">
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                size="small"
                severity="secondary"
                pTooltip="Edit"
                tooltipPosition="top"
                (onClick)="openEditDialog(user)"
              />
              <p-button
                [icon]="user.active ? 'pi pi-ban' : 'pi pi-check'"
                [text]="true"
                size="small"
                [severity]="user.active ? 'warn' : 'success'"
                [pTooltip]="user.active ? 'Deactivate' : 'Reactivate'"
                tooltipPosition="top"
                (onClick)="confirmToggleStatus(user)"
                [disabled]="user.id === auth.currentUser()?.id"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                size="small"
                severity="danger"
                pTooltip="Delete"
                tooltipPosition="top"
                (onClick)="confirmDelete(user)"
                [disabled]="user.id === auth.currentUser()?.id"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
      </p-card>
    }
  </div>
</div>

<vr-create-user-dialog
  [visible]="showCreateDialog()"
  (visibleChange)="showCreateDialog.set($event)"
  (created)="loadUsers()"
/>

<vr-edit-user-dialog
  [visible]="showEditDialog()"
  (visibleChange)="showEditDialog.set($event)"
  [user]="editingUser()"
  [currentUserId]="auth.currentUser()?.id ?? null"
  (updated)="loadUsers()"
/>
