<p-dialog
  [header]="header"
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  styleClass="account-dialog"
>
  <div class="dialog-form">
    <div class="form-field">
      <label for="acct-name">{{ 'ACCOUNT_DIALOG.NAME_LABEL' | translate }}</label>
      <input
        pInputText
        id="acct-name"
        [(ngModel)]="formName"
        [placeholder]="'ACCOUNT_DIALOG.NAME_PLACEHOLDER' | translate"
        class="w-full"
      />
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="acct-type">{{ 'ACCOUNT_DIALOG.TYPE_LABEL' | translate }}</label>
        <p-select
          inputId="acct-type"
          [options]="accountTypes"
          [(ngModel)]="formAccountType"
          optionLabel="label"
          optionValue="value"
          [placeholder]="'ACCOUNT_DIALOG.TYPE_PLACEHOLDER' | translate"
          styleClass="w-full"
          appendTo="body"
        />
      </div>
      <div class="form-field">
        <label for="asset-class">{{ 'ACCOUNT_DIALOG.ASSET_CLASS_LABEL' | translate }}</label>
        <p-select
          inputId="asset-class"
          [options]="assetClasses"
          [(ngModel)]="formAssetClass"
          optionLabel="label"
          optionValue="value"
          [placeholder]="'ACCOUNT_DIALOG.ASSET_CLASS_PLACEHOLDER' | translate"
          styleClass="w-full"
          appendTo="body"
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label for="acct-value">{{ 'ACCOUNT_DIALOG.VALUE_LABEL' | translate }}</label>
        <p-inputnumber
          inputId="acct-value"
          [(ngModel)]="formValue"
          mode="currency"
          currency="USD"
          locale="en-US"
          [min]="0"
          styleClass="w-full"
        />
      </div>
      <div class="form-field">
        <label for="return-rate">
          {{ 'ACCOUNT_DIALOG.RETURN_LABEL' | translate }}
          <i class="pi pi-info-circle" [pTooltip]="'ACCOUNT_DIALOG.RETURN_TOOLTIP' | translate" tooltipPosition="top"></i>
        </label>
        <p-inputnumber
          inputId="return-rate"
          [(ngModel)]="formReturnRate"
          [min]="0"
          [max]="100"
          suffix="%"
          [showClear]="true"
          styleClass="w-full"
        />
      </div>
    </div>

    <div class="form-field">
      <label for="acct-note">
        {{ 'ACCOUNT_DIALOG.NOTE_LABEL' | translate }}
        @if (!isEditMode) {
          <span class="label-hint">{{ 'ACCOUNT_DIALOG.NOTE_HINT_ADD' | translate }}</span>
        } @else {
          <span class="label-hint">{{ 'ACCOUNT_DIALOG.NOTE_HINT_EDIT' | translate }}</span>
        }
      </label>
      <textarea
        pTextarea
        id="acct-note"
        [(ngModel)]="formNote"
        [placeholder]="'ACCOUNT_DIALOG.NOTE_PLACEHOLDER' | translate"
        rows="2"
        class="w-full"
      ></textarea>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      [label]="'ACCOUNT_DIALOG.CANCEL' | translate"
      severity="secondary"
      [outlined]="true"
      (onClick)="close()"
    />
    <p-button
      [label]="isEditMode ? ('ACCOUNT_DIALOG.SAVE' | translate) : ('ACCOUNT_DIALOG.ADD' | translate)"
      icon="pi pi-check"
      [loading]="saving()"
      [disabled]="!formName.trim() || !formAccountType || !formAssetClass"
      (onClick)="save()"
    />
  </ng-template>
</p-dialog>
