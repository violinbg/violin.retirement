<div class="setup-page">
  <div class="setup-card">
    <div class="setup-card__header">
      <i class="pi pi-lock setup-card__icon"></i>
      <h1 class="setup-card__title">Welcome to Violin Retirement</h1>
      <p class="setup-card__subtitle">Let's create your admin account to get started.</p>
    </div>

    <form class="setup-card__form" (ngSubmit)="submit()" #f="ngForm">
      @if (error()) {
        <p-message severity="error" [text]="error()" styleClass="w-full mb-2" />
      }

      <div class="field">
        <label for="fullName">Full Name</label>
        <input
          pInputText
          id="fullName"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="Jane Smith"
          required
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input
          pInputText
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="jsmith"
          required
          minlength="3"
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <p-password
          inputId="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Min. 8 characters"
          [toggleMask]="true"
          [feedback]="true"
          inputStyleClass="w-full"
          required
        />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <p-password
          inputId="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Repeat password"
          [toggleMask]="true"
          [feedback]="false"
          inputStyleClass="w-full"
          required
        />
        @if (passwordMismatch) {
          <small class="field__error">Passwords do not match.</small>
        }
      </div>

      <p-button
        type="submit"
        label="Create Account"
        icon="pi pi-check"
        iconPos="right"
        styleClass="w-full"
        [loading]="loading()"
        [disabled]="passwordMismatch || !username || !fullName || !password"
      />
    </form>
  </div>
</div>
